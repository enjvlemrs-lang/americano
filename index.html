<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <title>Scent of M | Italy Coffee Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --brand-blue: #1e3d7b; --brand-bg: #f4f7fc; }
        body { background: var(--brand-bg); color: #2c3e50; font-family: 'Inter', sans-serif; margin: 0; }

        /* Floating Steam */
        .steam-container { position: relative; width: 100px; height: 100px; margin: 0 auto; }
        .steam { position: absolute; background: rgba(255,255,255,0.4); width: 3px; height: 30px; border-radius: 50%; animation: rise 3s infinite linear; }
        @keyframes rise { 0% { opacity: 0; transform: translateY(0); } 50% { opacity: 1; } 100% { opacity: 0; transform: translateY(-60px); } }

        /* Hero */
        .hero { height: 400px; background: var(--brand-blue); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        
        /* Wheel */
        .wheel-section { max-width: 600px; margin: 40px auto; text-align: center; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        #wheel { width: 220px; height: 220px; border: 10px solid var(--brand-blue); border-radius: 50%; margin: 20px auto; transition: 4s cubic-bezier(0.1, 0.8, 0.1, 1); cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Menu Tabs */
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: #ddd; border-radius: 20px; }
        .tab-btn.active { background: var(--brand-blue); color: white; }
        .tab-content { display: none; }
        .active-content { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 800px; margin: 0 auto; }
        .item { background: white; padding: 15px; border-radius: 10px; border-left: 4px solid var(--brand-blue); display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="hero">
        <div class="steam-container">
            <div class="steam" style="left: 40%;"></div>
            <div class="steam" style="left: 60%; animation-delay: 1.5s;"></div>
        </div>
        <h1>SCENT OF M</h1>
    </div>

    <section class="wheel-section" data-aos="fade-up">
        <h2>Өдрийн азтай кофе</h2>
        <div id="wheel" onclick="spin()">ЭРГҮҮЛ</div>
        <h3 id="res"></h3>
    </section>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('coffee')">Coffee</button>
        <button class="tab-btn" onclick="showTab('food')">Food</button>
    </div>

    <div id="coffee" class="active-content">
        <div class="item"><span>Americano</span><span>8,500 ₮</span></div>
        <div class="item"><span>Latte</span><span>9,500 ₮</span></div>
        <div class="item"><span>Cappuccino</span><span>9,500 ₮</span></div>
        <div class="item"><span>Mocha</span><span>11,900 ₮</span></div>
    </div>

    <div id="food" class="tab-content">
        <div class="active-content" style="display: grid;">
            <div class="item"><span>Croissant</span><span>6,500 ₮</span></div>
            <div class="item"><span>Tiramisu</span><span>10,000 ₮</span></div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        const coffees = ["Americano", "Latte", "Cappuccino", "Mocha"];
        
        function spin() {
            const wheel = document.getElementById('wheel');
            let deg = Math.floor(Math.random() * 3600) + 720;
            wheel.style.transform = `rotate(${deg}deg)`;
            setTimeout(() => {
                document.getElementById('res').innerText = "Таны кофе: " + coffees[Math.floor((deg % 360) / 90)];
            }, 4000);
        }

        function showTab(id) {
            document.querySelectorAll('.active-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'grid';
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
